---
# Sanjeevani API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sanjeevani-api
  namespace: sanjeevani
  labels:
    app: sanjeevani-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sanjeevani-api
  template:
    metadata:
      labels:
        app: sanjeevani-api
    spec:
      containers:
        - name: api
          image: sanjeevani-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: sanjeevani-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: sanjeevani-api
  namespace: sanjeevani
spec:
  selector:
    app: sanjeevani-api
  ports:
    - port: 8000
      targetPort: 8000
---
# HPA — auto-scale on CPU
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sanjeevani-api-hpa
  namespace: sanjeevani
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sanjeevani-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
# Qdrant StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qdrant
  namespace: sanjeevani
spec:
  serviceName: qdrant
  replicas: 1
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.9.2
          ports:
            - containerPort: 6333
          volumeMounts:
            - name: qdrant-storage
              mountPath: /qdrant/storage
  volumeClaimTemplates:
    - metadata:
        name: qdrant-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
